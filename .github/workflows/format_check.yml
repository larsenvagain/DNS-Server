name: Code formatting check
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/checkout@v6
      - uses: psf/black@stable
        with:
          options: "--target-version py312"
